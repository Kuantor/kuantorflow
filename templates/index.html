{% extends "base.html" %}

{% block content %}
    <h1 class="page-title">Welcome to KuantorFlow</h1>

    {% if message %}
        <div class="banner error"><strong>{{ message }}</strong></div>
    {% endif %}

    <div class="panel">
        <h2>Look up a word (Reverso)</h2>
        <form method="POST">
            <input type="hidden" name="action" value="parse_word">
            <div class="form-row">
                <div>
                    <label for="word">Word</label>
                    <input type="text" id="word" name="word" required
                           placeholder="e.g. streamline">
                </div>
                <div>
                    <label for="word-topic">Topic</label>
                    <input type="text" id="word-topic" name="topic" placeholder="general">
                </div>
            </div>
            <button type="submit">Look up &amp; save</button>
        </form>
    </div>

    <div class="panel">
        <h2>Upload notes (.mht)</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="action" value="upload_mht">
            <div class="form-row">
                <div>
                    <label for="mht-file">File</label>
                    <input type="file" id="mht-file" name="mht_file" accept=".mht,.mhtml" required>
                </div>
                <div>
                    <label for="mht-topic">Topic</label>
                    <input type="text" id="mht-topic" name="topic" placeholder="general">
                </div>
            </div>
            <button type="submit">Upload &amp; save</button>
        </form>
    </div>

    <div class="panel">
        <h2>Browse flashcards</h2>
        <form method="GET" onsubmit="window.location='/flashcards/' + encodeURIComponent(this.topic.value); return false;">
            <label for="browse-topic">Topic</label>
            <input type="text" id="browse-topic" name="topic" required
                   placeholder="Type a topic name">
            <button type="submit">Show flashcards</button>
        </form>
    </div>

    <div class="panel">
        <h2>Database</h2>
        <form method="POST">
            <input type="hidden" name="action" value="test_db">
            <button type="submit">Test DB Connection</button>
        </form>
    </div>
{% endblock %}
