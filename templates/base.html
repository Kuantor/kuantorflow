<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}KuantorFlow{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('index') }}">Kuantor<span>Flow</span></a>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
        </nav>
    </header>

    <main class="page">
        {% for text, topic in get_flashed_messages() %}
            <div class="banner confirmation">
                {{ text }}
                {% if topic %}
                    <a href="{{ url_for('flashcards', topic=topic) }}">View topic &rarr;</a>
                {% endif %}
            </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        KuantorFlow &mdash; interactive language learning with notes and dictionaries
    </footer>
</body>
</html>
